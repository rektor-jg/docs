<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171A1F"/>
      <stop offset="100%" stop-color="#0B1714"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg6)"/>
  <text x="600" y="50" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">From PoW mining to AI compute — major milestones</text>

  <line x1="100" y1="240" x2="1100" y2="240" stroke="#2AD46F" stroke-opacity="0.3" stroke-width="3"/>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(140 240)">
      <circle r="14" fill="#171A1F" stroke="#2AD46F" stroke-width="3"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2017</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">Founded</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">Miner App launches</text>
    </g>

    <g transform="translate(310 240)">
      <circle r="14" fill="#171A1F" stroke="#2AD46F" stroke-width="3"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2020</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">GHX TGE</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">Listed on Bithumb 2021</text>
    </g>

    <g transform="translate(480 240)">
      <circle r="14" fill="#171A1F" stroke="#2AD46F" stroke-width="3"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2023</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">GamerHash AI begins</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">First image-gen module</text>
    </g>

    <g transform="translate(650 240)">
      <circle r="14" fill="#171A1F" stroke="#2AD46F" stroke-width="3"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2024</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">AI App matures</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">Llama 3, image LoRA</text>
    </g>

    <g transform="translate(820 240)">
      <circle r="14" fill="#171A1F" stroke="#2AD46F" stroke-width="3"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2025</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">deAPI public, video models</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">Solana staking + LP</text>
    </g>

    <g transform="translate(990 240)">
      <circle r="14" fill="#2AD46F"/>
      <text x="0" y="-50" text-anchor="middle" fill="#2AD46F" font-size="14" font-weight="700">2026</text>
      <text x="0" y="50" text-anchor="middle" fill="#F9F9F9" font-size="13" font-weight="600">Pure-AI era</text>
      <text x="0" y="70" text-anchor="middle" fill="#9DA4AE" font-size="11">Mining concluded Jan 31</text>
