<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171A1F"/>
      <stop offset="100%" stop-color="#0B1714"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2230"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2AD46F"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="600" y="46" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">How the GamerHash ecosystem works</text>

  <g transform="translate(60 110)">
    <rect width="220" height="160" rx="16" fill="url(#card)" stroke="#2AD46F" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="110" y="36" text-anchor="middle" fill="#2AD46F" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">CONTRIBUTORS</text>
    <text x="110" y="74" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">Gamers with idle GPUs</text>
    <text x="110" y="106" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Run GamerHash AI App</text>
    <text x="110" y="126" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Earn GUSD + GHXP</text>
    <text x="110" y="146" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">800,000+ registered</text>
  </g>

  <g transform="translate(490 80)">
    <rect width="220" height="220" rx="20" fill="url(#card)" stroke="#2AD46F" stroke-width="2"/>
    <text x="110" y="40" text-anchor="middle" fill="#2AD46F" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">DePIN NETWORK</text>
    <text x="110" y="80" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">GamerHash AI</text>
    <text x="110" y="104" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Aggregates &amp; routes</text>
    <text x="110" y="124" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">workloads to free GPUs</text>
    <line x1="30" y1="148" x2="190" y2="148" stroke="#2AD46F" stroke-opacity="0.3"/>
    <text x="110" y="172" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="12">Inference · Image · Video</text>
    <text x="110" y="190" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="12">Voice · Embeddings</text>
  </g>

  <g transform="translate(920 110)">
    <rect width="220" height="160" rx="16" fill="url(#card)" stroke="#2AD46F" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="110" y="36" text-anchor="middle" fill="#2AD46F" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">CONSUMERS</text>
    <text x="110" y="74" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">AI builders &amp; developers</text>
    <text x="110" y="106" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">deAPI integration</text>
    <text x="110" y="126" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">n8n workflows</text>
    <text x="110" y="146" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Pay per request</text>
  </g>

  <g stroke="#2AD46F" stroke-width="2.5" fill="none">
    <line x1="280" y1="190" x2="490" y2="190" marker-end="url(#arrow)"/>
    <line x1="710" y1="190" x2="920" y2="190" marker-end="url(#arrow)"/>
  </g>
  <text x="385" y="180" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="12">GPU power</text>
  <text x="815" y="180" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="12">Compute</text>

  <g transform="translate(280 360)">
    <rect width="640" height="120" rx="16" fill="url(#card)" stroke="#2AD46F" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="320" y="38" text-anchor="middle" fill="#2AD46F" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">VALUE LOOP</text>
    <text x="320" y="68" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="15">Revenue → buyback &amp; burn of GHX → rewards back to contributors</text>
    <text x="320" y="92" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Loop self-reinforces as more partners join the network</text>
  </g>

  <g stroke="#2AD46F" stroke-opacity="0.6" stroke-width="2" fill="none" stroke-dasharray="6 5">
    <path d="M1030 270 Q 1100 320 900 380" marker-end="url(#arrow)"/>
    <path d="M170 270 Q 100 320 280 380" marker-end="url(#arrow)"/>
  </g>
  <text x="1108" y="332" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="11">$ revenue</text>
  <text x="92" y="332" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="11">$ rewards</text>
</svg>
