<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bgAB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171A1F"/>
      <stop offset="100%" stop-color="#0B1714"/>
    </linearGradient>
    <linearGradient id="cardAB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2230"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <marker id="arrAB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2AD46F"/>
    </marker>
    <marker id="arrABback" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9DA4AE"/>
    </marker>
  </defs>
  <rect width="1200" height="500" fill="url(#bgAB)"/>
  <text x="600" y="48" text-anchor="middle" fill="#F9F9F9" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">How a deAPI request flows</text>
  <text x="600" y="76" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="13">Your code calls an OpenAI-compatible endpoint — the network does the rest</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(50 130)">
      <rect width="220" height="150" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-opacity="0.45" stroke-width="1.5"/>
      <text x="110" y="36" text-anchor="middle" fill="#2AD46F" font-size="11" font-weight="700" letter-spacing="1">CLIENT</text>
      <text x="110" y="70" text-anchor="middle" fill="#F9F9F9" font-size="16" font-weight="700">Your app</text>
      <text x="110" y="98" text-anchor="middle" fill="#9DA4AE" font-size="11">OpenAI SDK, n8n,</text>
      <text x="110" y="116" text-anchor="middle" fill="#9DA4AE" font-size="11">Telegram / Discord bots,</text>
      <text x="110" y="134" text-anchor="middle" fill="#9DA4AE" font-size="11">automation pipelines</text>
    </g>

    <g transform="translate(310 130)">
      <rect width="220" height="150" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-opacity="0.45" stroke-width="1.5"/>
      <text x="110" y="36" text-anchor="middle" fill="#2AD46F" font-size="11" font-weight="700" letter-spacing="1">GATEWAY</text>
      <text x="110" y="70" text-anchor="middle" fill="#F9F9F9" font-size="16" font-weight="700">deAPI</text>
      <text x="110" y="98" text-anchor="middle" fill="#9DA4AE" font-size="11">Authenticate</text>
      <text x="110" y="116" text-anchor="middle" fill="#9DA4AE" font-size="11">Bill (Stripe / crypto)</text>
      <text x="110" y="134" text-anchor="middle" fill="#9DA4AE" font-size="11">Rate-limit · route</text>
    </g>

    <g transform="translate(570 130)">
      <rect width="220" height="150" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-opacity="0.45" stroke-width="1.5"/>
      <text x="110" y="36" text-anchor="middle" fill="#2AD46F" font-size="11" font-weight="700" letter-spacing="1">DISPATCHER</text>
      <text x="110" y="70" text-anchor="middle" fill="#F9F9F9" font-size="16" font-weight="700">Network match</text>
      <text x="110" y="98" text-anchor="middle" fill="#9DA4AE" font-size="11">Match by model + VRAM</text>
      <text x="110" y="116" text-anchor="middle" fill="#9DA4AE" font-size="11">Failover on transient errors</text>
      <text x="110" y="134" text-anchor="middle" fill="#9DA4AE" font-size="11">Balance by fit</text>
    </g>

    <g transform="translate(830 130)">
      <rect width="320" height="150" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-width="2"/>
      <text x="160" y="36" text-anchor="middle" fill="#2AD46F" font-size="11" font-weight="700" letter-spacing="1">GPU NODE</text>
      <text x="160" y="70" text-anchor="middle" fill="#F9F9F9" font-size="16" font-weight="700">Contributor's machine</text>
      <text x="160" y="98" text-anchor="middle" fill="#9DA4AE" font-size="11">RTX 16+ GB VRAM running the AI App</text>
      <text x="160" y="116" text-anchor="middle" fill="#9DA4AE" font-size="11">Runs the inference locally</text>
      <text x="160" y="134" text-anchor="middle" fill="#9DA4AE" font-size="11">No prompt or output retained</text>
    </g>
  </g>

  <g stroke="#2AD46F" stroke-width="2" fill="none">
    <line x1="270" y1="190" x2="310" y2="190" marker-end="url(#arrAB)"/>
    <line x1="530" y1="190" x2="570" y2="190" marker-end="url(#arrAB)"/>
    <line x1="790" y1="190" x2="830" y2="190" marker-end="url(#arrAB)"/>
  </g>

  <text x="600" y="320" text-anchor="middle" fill="#9DA4AE" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic">Result returns the same path — streaming token-by-token where supported</text>
  <g stroke="#9DA4AE" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.7">
    <line x1="830" y1="305" x2="790" y2="305" marker-end="url(#arrABback)"/>
    <line x1="570" y1="305" x2="530" y2="305" marker-end="url(#arrABback)"/>
    <line x1="310" y1="305" x2="270" y2="305" marker-end="url(#arrABback)"/>
  </g>

  <g transform="translate(50 360)" font-family="Inter, system-ui, sans-serif">
    <rect width="540" height="110" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-opacity="0.45"/>
    <text x="270" y="36" text-anchor="middle" fill="#2AD46F" font-size="12" font-weight="700" letter-spacing="1">PLATFORM INFRASTRUCTURE</text>
    <text x="270" y="68" text-anchor="middle" fill="#F9F9F9" font-size="14">Gateway, dispatch, billing, model availability</text>
    <text x="270" y="92" text-anchor="middle" fill="#9DA4AE" font-size="12">A portion of every paid request</text>
  </g>

  <g transform="translate(610 360)" font-family="Inter, system-ui, sans-serif">
    <rect width="540" height="110" rx="14" fill="url(#cardAB)" stroke="#2AD46F" stroke-width="2"/>
    <text x="270" y="36" text-anchor="middle" fill="#2AD46F" font-size="12" font-weight="700" letter-spacing="1">CONTRIBUTOR PAY · GUSD</text>
    <text x="270" y="68" text-anchor="middle" fill="#F9F9F9" font-size="14">Direct, per workload, into the contributor's account</text>
    <text x="270" y="92" text-anchor="middle" fill="#9DA4AE" font-size="12">Same loop that pays gamers and dedicated GPU contributors</text>
  </g>
</svg>
